<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather & To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>My App</h1>
            <p>Weather & To-Do List</p>
        </header>

        <main class="main-content">
            <section class="weather-section card">
                <h2>Current Weather</h2>
                <div id="weather-display">
                    <p class="loading">Loading weather...</p>
                </div>
                <div id="forecast-display">
                    <p class="loading">Loading forecast...</p>
                </div>
            </section>

            <section class="todo-section card">
                <h2>To-Do List</h2>
                <div class="todo-input-area">
                    <input type="text" id="todo-input" placeholder="Add a new task...">
                    <button id="add-todo-btn">Add</button>
                </div>
                <ul id="todo-list">
                    <li class="loading">Loading tasks...</li>
                </ul>
            </section>
        </main>

        <footer class="app-footer">
            <p>&copy; 2023 Your App Name</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
