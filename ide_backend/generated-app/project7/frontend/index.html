<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Productivity Hub</h1>
            <p>Your central place for managing tasks.</p>
        </header>

        <main>
            <section id="add-task-section" class="card">
                <h2>Add New Task</h2>
                <div class="task-input-group">
                    <input type="text" id="task-input" placeholder="Enter a new task...">
                    <button id="add-task-btn">Add Task</button>
                </div>
            </section>

            <section id="task-list-section">
                <h2>Your Tasks</h2>
                <div id="tasks-container">
                    <p id="no-tasks-message">No tasks yet. Add one above!</p>
                    <ul id="task-list">
                        <!-- Tasks will be loaded here -->
                    </ul>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2023 Productivity Hub. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
